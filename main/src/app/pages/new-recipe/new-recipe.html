<form id="uploadform" class="bg-light pb-5">
  <div class="container-fluid py-4 bg-white shadow-sm mb-4 sticky-top">
    <div class="row align-items-center">
      <div class="col-md-8">
        <h1 class="fw-bold text-dark">Subir Receta</h1>
      </div>
       <div class="col-md-2 col-6 d-flex justify-content-end">
          <button type="button" class="btn-app">
            <img src="../../Img/002-upload.png" alt="">
            <span>Subir</span>
          </button>
        </div>
        <div class="col-md-2 col-6 d-flex justify-content-end">
          <button type="button" class="btn-app">
            <img src="../../Img/001-watch.png" alt="">
            <span>Vista Previa</span>
          </button>
        </div>
      </div>
    </div>

  <fieldset class="container my-4 bg-white">
    <legend>Información básica</legend>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Título</label>
        <input type="text" class="form-control" placeholder="Título de la receta...">
      </div>
      <div class="col-md-6">
        <label class="form-label">Descripción</label>
        <input type="text" class="form-control" placeholder="Breve descripción...">
      </div>
      <div class="col-md-4">
        <label class="form-label">Tiempo (min)</label>
        <input type="number" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">Porciones</label>
        <input type="number" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">Dificultad</label>
        <select class="form-select">
          <option value="facil">Fácil</option>
          <option value="media">Media</option>
          <option value="dificil">Difícil</option>
        </select>
      </div>
    </div>
  </fieldset>

  <fieldset class="container my-4 bg-white">
    <legend>Ingredientes</legend>

    <div id="ingredientesContainer" class="d-flex flex-wrap gap-2 mb-3">
      <div class="card-item-selected" *ngFor="let ing of seleccionados">
        {{ing.nombre}} ({{ing.cantidad}} {{ing.unidad}})
        <span class="remove-btn">×</span>
      </div>
    </div>

    <div class="row g-3 align-items-end">
      <div class="col-md-4">
        <label class="form-label">Ingrediente</label>
        <div class="fake-input">
          
        </div>
      </div>
      <div class="col-md-2">
        <input type="text" class="form-control" placeholder="Cantidad">
      </div>
      <div class="col-md-2">
        <input type="text" class="form-control" placeholder="Unidad">
      </div>
      <div class="col-md-2 text-center">
        <label class="d-block mb-1">¿Sustituto?</label>
        <label class="switch m-0">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="col-md-2">
        <button type="button" class="btn-app w-100">
          <img src="../../Img/002-add.png" alt="">
          <span>Agregar</span>
        </button>
      </div>
    </div>
  </fieldset>

  <fieldset class="container my-4 bg-white">
    <legend>Etiquetas</legend>
    
    <div class="tags-selected mb-3">
      <span class="badge-tag active">
        <small>×</small>
      </span>
    </div>

    <div class="sugerencias-box p-3 border rounded">
      <p class="small text-muted mb-2">Sugerencias (haz click para agregar):</p>
      <div class="d-flex flex-wrap gap-2">
        <span class="badge-tag suggestion"></span>
        <button type="button" class="btn-app w-100">
          Ver todas las etiquetas...
        </button>
      </div>
    </div>
  </fieldset>
</form>

<div class="modal-overlay" *ngIf="mostrarModalIngredientes">
  <div class="modal-card">
    <div class="modal-header-app">
      <h5 class="m-0">Buscar Ingrediente</h5>
      <button class="close-modal">×</button>
    </div>
    <div class="modal-body-app">
      <input type="text" class="form-control mb-3" placeholder="Filtrar por nombre...">
      <div class="filtro-scroll">
        <div class="filtro-item" *ngFor="let item of catalogo">
          {{item.nombre}}
        </div>
      </div>
    </div>
  </div>
</div>
