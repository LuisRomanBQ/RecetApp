<div class="container">
    <h1>Iniciar Sesión</h1>

    <form (ngSubmit)="iniciarSesion()">

        <div class="form-group">
            <i class="fas fa-user"></i>
            <input
                type="email"
                placeholder="Correo"
                [(ngModel)]="correo"
                name="correo"
                required
            >
        </div>

        <div class="form-group">
            <i class="fas fa-lock"></i>
            <input
                type="password"
                placeholder="Contraseña"
                [(ngModel)]="contrasena"
                name="contrasena"
                required
            >
        </div>

        <button type="submit">Ingresar</button>

        <div class="signup-link">
            ¿No tienes cuenta?
            <a routerLink="/registro">Regístrate aquí</a>
        </div>

    </form>
</div>
